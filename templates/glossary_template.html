<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glossary - {{ VIDEO_TITLE }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Outfit:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
            --accent: #818cf8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            line-height: 1.6;
            padding: 2rem 1rem;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 3rem;
            text-align: center;
        }

        .video-id {
            display: inline-block;
            background: rgba(99, 102, 241, 0.1);
            color: var(--accent);
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.875rem;
            font-weight: 600;
            margin-bottom: 1rem;
            letter-spacing: 0.025em;
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .metadata {
            color: var(--text-muted);
            font-size: 1rem;
        }

        .glossary-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 1.5rem;
            overflow: hidden;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            background-color: rgba(15, 23, 42, 0.5);
            padding: 1.25rem 1.5rem;
            font-weight: 600;
            color: var(--text-muted);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            border-bottom: 1px solid var(--border);
        }

        td {
            padding: 1.5rem;
            border-bottom: 1px solid var(--border);
            vertical-align: top;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover td {
            background-color: rgba(255, 255, 255, 0.02);
        }

        .term-cell {
            width: 25%;
        }

        .term {
            font-weight: 700;
            color: var(--accent);
            font-size: 1.125rem;
        }

        .translation {
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 0.25rem;
            font-size: 1.125rem;
        }

        .explanation {
            color: var(--text-muted);
            font-size: 0.9375rem;
            line-height: 1.5;
        }

        @media (max-width: 640px) {
            h1 { font-size: 1.75rem; }
            td, th { padding: 1rem; }
            .term-cell { width: 35%; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <span class="video-id">{{ VIDEO_ID }}</span>
            <h1>{{ VIDEO_TITLE }}</h1>
            <p class="metadata">Generated on {{ GENERATED_DATE }}</p>
        </header>

        <div class="glossary-card">
            <table>
                <thead>
                    <tr>
                        <th class="term-cell">Term</th>
                        <th>Translation & Explanation</th>
                    </tr>
                </thead>
                <tbody id="glossary-body">
                    <!-- JavaScript will populate this -->
                </tbody>
            </table>
        </div>
    </div>

    <script id="glossary-data" type="application/json">
        {{ GLOSSARY_JSON }}
    </script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const dataElement = document.getElementById('glossary-data');
            const tbody = document.getElementById('glossary-body');
            
            try {
                const glossary = JSON.parse(dataElement.textContent);
                
                glossary.forEach(item => {
                    const row = document.createElement('tr');
                    
                    row.innerHTML = `
                        <td class="term-cell"><span class="term">${item.term}</span></td>
                        <td>
                            <div class="translation">${item.translation}</div>
                            <div class="explanation">${item.explanation}</div>
                        </td>
                    `;
                    
                    tbody.appendChild(row);
                });
            } catch (e) {
                console.error('Failed to parse glossary data:', e);
                tbody.innerHTML = '<tr><td colspan="2" style="text-align:center; padding: 2rem; color: var(--text-muted);">Error loading glossary data.</td></tr>';
            }
        });
    </script>
</body>
</html>
